<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Urgencia')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<div th:replace="~{layout :: flash}"></div>

<div class="container my-4" style="max-width: 640px;">
    <h1 class="h3 mb-3" th:text="${registro.id} ? 'Editar urgencia' : 'Nova urgencia'">Urgencia</h1>

    <form th:action="@{/controle-urgencias}" th:object="${registro}" method="post" class="card">
        <div class="card-body">
            <input type="hidden" th:field="*{id}">

            <div class="mb-3">
                <label class="form-label">Nome do paciente *</label>
                <input type="text" th:field="*{nomePaciente}" class="form-control" required>
                <div class="text-danger small" th:errors="*{nomePaciente}"></div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">RGCT / SNT</label>
                    <input type="text" th:field="*{rgct}" class="form-control" placeholder="SNT-XXXX">
                </div>
                <div class="col-md-3">
                    <label class="form-label">ABO</label>
                    <select th:field="*{abo}" class="form-select">
                        <option value="">--</option>
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="AB">AB</option>
                        <option value="O">O</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Vencimento</label>
                    <input type="date" th:field="*{dataVencimento}" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Equipe solicitante</label>
                <input type="text" th:field="*{equipe}" class="form-control" placeholder="Ex.: HCPA - Nefrologia">
            </div>

            <div class="mb-3">
                <label class="form-label">Observacoes</label>
                <textarea th:field="*{observacoes}" class="form-control" rows="3"></textarea>
            </div>
        </div>

        <div class="card-footer text-end">
            <a th:href="@{/controle-urgencias}" class="btn btn-outline-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
    </form>
</div>

<script th:replace="~{layout :: scripts}"></script>
</body>
</html>
