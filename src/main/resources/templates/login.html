<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Entrar')}"></head>
<body class="bg-light">
<div class="container" style="max-width: 380px; margin-top: 8vh;">
    <div class="text-center mb-4">
        <i class="bi bi-droplet-half text-primary" style="font-size: 3rem;"></i>
        <h1 class="h4 mt-2">SGPUR</h1>
        <p class="text-muted small">Gestao de Processos de Urgencia Renal</p>
    </div>
    <div class="card shadow-sm">
        <div class="card-body">
            <div th:if="${param.error}" class="alert alert-danger py-2">Usuario ou senha invalidos.</div>
            <div th:if="${param.logout}" class="alert alert-success py-2">Sessao encerrada.</div>
            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" autofocus required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>
        </div>
    </div>
</div>
<script th:replace="~{layout :: scripts}"></script>
</body>
</html>
