# Perfil de producao - PostgreSQL (Neon / Vercel Postgres).
#
# O datasource (url/username/password) NAO fica aqui. Ele vem de:
#  - application-local.yml (gitignored) para rodar localmente contra o Neon, OU
#  - variaveis de ambiente no servidor de hospedagem:
#       SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring:
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  h2:
    console:
      enabled: false

app:
  admin:
    # Sem default aqui de proposito: se SGPUR_ADMIN_PASSWORD nao estiver
    # setada no ambiente, a resolucao deste placeholder falha e o boot
    # para - em vez de subir com a senha fraca "admin123" (default usado
    # so em dev/desktop, em application.yml).
    password: ${SGPUR_ADMIN_PASSWORD}
