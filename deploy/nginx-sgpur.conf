server {
    listen 80;
    server_name _;

    # Acompanha o limite de upload do app (multipart 30MB)
    client_max_body_size 30m;

    # Headers de seguranca basicos. NAO substituem TLS: este arquivo so
    # termina HTTP puro (porta 80) - o sistema lida com dados de paciente
    # (nome, RGCT), entao configure HTTPS (certbot/Let's Encrypt ou um
    # proxy/CDN na frente com TLS) antes de expor a porta 80 publicamente.
    # Ver deploy/README-deploy.md.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
